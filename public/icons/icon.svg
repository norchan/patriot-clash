<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="50%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#ffffff18" stroke-width="3"/>

  <!-- Shield body -->
  <path d="M256 90 L390 145 L390 280 Q390 370 256 430 Q122 370 122 280 L122 145 Z" fill="url(#shield)"/>

  <!-- White stars band -->
  <path d="M256 90 L390 145 L390 210 L122 210 L122 145 Z" fill="#1e3a8a"/>

  <!-- Stars (5 of them) -->
  <g fill="white" opacity="0.95">
    <polygon points="175,173 180,185 193,185 183,193 187,205 175,197 163,205 167,193 157,185 170,185" transform="scale(0.75) translate(58,55)"/>
    <polygon points="215,173 220,185 233,185 223,193 227,205 215,197 203,205 207,193 197,185 210,185" transform="scale(0.75) translate(58,55)"/>
    <polygon points="255,173 260,185 273,185 263,193 267,205 255,197 243,205 247,193 237,185 250,185" transform="scale(0.75) translate(58,55)"/>
    <polygon points="295,173 300,185 313,185 303,193 307,205 295,197 283,205 287,193 277,185 290,185" transform="scale(0.75) translate(58,55)"/>
    <polygon points="335,173 340,185 353,185 343,193 347,205 335,197 323,205 327,193 317,185 330,185" transform="scale(0.75) translate(58,55)"/>
  </g>

  <!-- Horizontal stripes on red half -->
  <clipPath id="redClip">
    <path d="M256 90 L390 145 L390 280 Q390 370 256 430 Q122 370 122 280 L122 210 L390 210 L390 280 Q390 370 256 430 Q122 370 122 280 L122 210"/>
  </clipPath>
  <rect x="122" y="210" width="268" height="22" fill="white" opacity="0.25"/>
  <rect x="122" y="254" width="268" height="22" fill="white" opacity="0.25"/>
  <rect x="130" y="298" width="252" height="22" fill="white" opacity="0.25"/>
  <rect x="155" y="340" width="202" height="20" fill="white" opacity="0.20"/>

  <!-- Center star burst -->
  <circle cx="256" cy="295" r="35" fill="white" opacity="0.12"/>
  <text x="256" y="310" font-size="44" text-anchor="middle" fill="white" opacity="0.9">⭐</text>

  <!-- Bottom text -->
  <text x="256" y="480" font-size="32" font-weight="bold" text-anchor="middle" fill="white" opacity="0.7" font-family="sans-serif">PoliticsGo</text>
</svg>
